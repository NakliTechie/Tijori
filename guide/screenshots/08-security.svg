<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 700" width="390" height="700">
  <rect width="390" height="700" fill="#0b0d10"/>

  <!-- Settings modal frame -->
  <rect x="14" y="60" width="362" height="600" rx="14" fill="#14181d" stroke="#262c34" stroke-width="1"/>
  <text x="32" y="92" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="18" fill="#e6e8eb">Settings</text>

  <!-- Tabs -->
  <rect x="32" y="108" width="64" height="28" rx="6" fill="#1b2026" stroke="#262c34"/>
  <text x="64" y="126" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#8a94a3">Vault</text>
  <rect x="100" y="108" width="72" height="28" rx="6" fill="#1b2026" stroke="#262c34"/>
  <text x="136" y="126" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#8a94a3">Devices</text>
  <rect x="176" y="108" width="76" height="28" rx="6" fill="#7cc4ff" stroke="#7cc4ff"/>
  <text x="214" y="126" text-anchor="middle" font-family="-apple-system" font-weight="600" font-size="12" fill="#001122">Security</text>
  <rect x="256" y="108" width="60" height="28" rx="6" fill="#1b2026" stroke="#262c34"/>
  <text x="286" y="126" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#8a94a3">Data</text>

  <!-- Section: HARDWARE KEYS -->
  <text x="32" y="170" font-family="-apple-system" font-weight="600" font-size="11" fill="#8a94a3" letter-spacing="0.5">HARDWARE KEYS</text>

  <!-- Bound key 1 -->
  <rect x="32" y="182" width="326" height="56" rx="8" fill="#1b2026" stroke="#262c34"/>
  <text x="48" y="208" font-family="-apple-system" font-weight="500" font-size="14" fill="#e6e8eb">YubiKey 5 NFC (primary)</text>
  <text x="48" y="226" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#8a94a3">usb, nfc · added 2026-05-17</text>
  <rect x="288" y="200" width="58" height="22" rx="6" fill="transparent" stroke="#262c34"/>
  <text x="317" y="216" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#8a94a3">Remove</text>

  <!-- Bound key 2 -->
  <rect x="32" y="248" width="326" height="56" rx="8" fill="#1b2026" stroke="#262c34"/>
  <text x="48" y="274" font-family="-apple-system" font-weight="500" font-size="14" fill="#e6e8eb">YubiKey 5C (backup)</text>
  <text x="48" y="292" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#8a94a3">usb · added 2026-05-17</text>
  <rect x="288" y="266" width="58" height="22" rx="6" fill="transparent" stroke="#262c34"/>
  <text x="317" y="282" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#8a94a3">Remove</text>

  <!-- Bind button + change password -->
  <rect x="32" y="320" width="184" height="36" rx="8" fill="#7cc4ff"/>
  <text x="124" y="343" text-anchor="middle" font-family="-apple-system" font-weight="600" font-size="13" fill="#001122">＋ Bind a hardware key</text>
  <rect x="222" y="320" width="136" height="36" rx="8" fill="transparent" stroke="#262c34"/>
  <text x="290" y="343" text-anchor="middle" font-family="-apple-system" font-size="13" fill="#8a94a3">Change master password</text>

  <!-- Password-fallback toggle -->
  <rect x="32" y="368" width="326" height="44" rx="8" fill="#1b2026" stroke="#262c34"/>
  <rect x="48" y="384" width="14" height="14" rx="3" fill="#0b0d10" stroke="#7cc4ff"/>
  <text x="72" y="396" font-family="-apple-system" font-size="13" fill="#e6e8eb">Allow master-password-only unlock as a fallback</text>

  <!-- Section divider + Session header -->
  <line x1="32" y1="436" x2="358" y2="436" stroke="#262c34" stroke-width="1"/>
  <text x="32" y="462" font-family="-apple-system" font-weight="600" font-size="11" fill="#8a94a3" letter-spacing="0.5">SESSION</text>

  <text x="32" y="488" font-family="-apple-system" font-size="12" fill="#8a94a3">Idle timeout (seconds)</text>
  <rect x="32" y="496" width="326" height="36" rx="8" fill="#1b2026" stroke="#262c34"/>
  <text x="48" y="519" font-family="-apple-system" font-size="14" fill="#e6e8eb">300</text>

  <text x="32" y="552" font-family="-apple-system" font-size="12" fill="#8a94a3">Clipboard clear (seconds)</text>
  <rect x="32" y="560" width="326" height="36" rx="8" fill="#1b2026" stroke="#262c34"/>
  <text x="48" y="583" font-family="-apple-system" font-size="14" fill="#e6e8eb">30</text>

  <!-- Save button -->
  <rect x="32" y="616" width="120" height="32" rx="8" fill="#7cc4ff"/>
  <text x="92" y="637" text-anchor="middle" font-family="-apple-system" font-weight="600" font-size="13" fill="#001122">Save settings</text>
</svg>
