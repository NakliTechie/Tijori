<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 700" width="390" height="700">
  <!-- Background (dimmed vault) -->
  <rect width="390" height="700" fill="#0b0d10"/>

  <!-- Topbar (dimmed) -->
  <rect width="390" height="52" fill="#0b0d10" opacity="0.35"/>
  <text x="20" y="34" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="18" letter-spacing="1" fill="#7cc4ff" opacity="0.35">TIJORI</text>

  <!-- Modal dim overlay -->
  <rect width="390" height="700" fill="rgba(0,0,0,0.55)"/>

  <!-- Modal sheet (bottom sheet) -->
  <rect x="0" y="130" width="390" height="570" rx="16" fill="#14181d" stroke="#262c34" stroke-width="1"/>

  <!-- Modal title -->
  <text x="24" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="20" fill="#e6e8eb">New entry</text>

  <!-- Tab row -->
  <rect x="24" y="182" width="342" height="36" rx="8" fill="#1b2026"/>
  <!-- Login tab -->
  <rect x="28" y="186" width="82" height="28" rx="6"/>
  <text x="69" y="206" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">🔑 Login</text>
  <!-- Card tab -->
  <text x="155" y="206" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">💳 Card</text>
  <!-- Note tab -->
  <text x="240" y="206" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">📝 Note</text>
  <!-- Code tab ACTIVE -->
  <rect x="282" y="186" width="80" height="28" rx="6" fill="#7cc4ff"/>
  <text x="322" y="206" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#001122">🔐 Code</text>

  <!-- otpauth URI field -->
  <text x="24" y="244" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">otpauth:// URI (optional — auto-fills fields)</text>
  <rect x="24" y="252" width="342" height="38" rx="8" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="38" y="276" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#8a94a3">otpauth://totp/GitHub:chirag@github.com?secret=…</text>

  <!-- Label field -->
  <text x="24" y="316" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Label *</text>
  <rect x="24" y="324" width="342" height="38" rx="8" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="38" y="348" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#e6e8eb">GitHub</text>

  <!-- Secret field -->
  <text x="24" y="386" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Secret (Base32)</text>
  <rect x="24" y="394" width="342" height="38" rx="8" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="38" y="418" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#8a94a3" letter-spacing="2">••••••••••••••••</text>
  <text x="350" y="418" text-anchor="end" font-size="16" fill="#8a94a3">👁</text>

  <!-- Account + Issuer row -->
  <text x="24" y="458" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Account</text>
  <text x="200" y="458" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Issuer</text>
  <rect x="24" y="466" width="164" height="34" rx="7" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="36" y="488" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#e6e8eb">chirag@github.com</text>
  <rect x="202" y="466" width="164" height="34" rx="7" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="214" y="488" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#e6e8eb">GitHub</text>

  <!-- Algorithm / Digits / Period -->
  <text x="24" y="522" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Algorithm</text>
  <text x="144" y="522" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Digits</text>
  <text x="260" y="522" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Period</text>
  <rect x="24" y="530" width="106" height="32" rx="7" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="77" y="551" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e6e8eb">SHA-1</text>
  <rect x="142" y="530" width="106" height="32" rx="7" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="195" y="551" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e6e8eb">6</text>
  <rect x="260" y="530" width="106" height="32" rx="7" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="313" y="551" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#e6e8eb">30s</text>

  <!-- Footer buttons -->
  <rect x="252" y="582" width="70" height="36" rx="8" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="287" y="606" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#8a94a3">Cancel</text>
  <rect x="334" y="582" width="58" height="36" rx="8" fill="#7cc4ff"/>
  <text x="363" y="606" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#001122">Save</text>
</svg>
