  <!-- ═══ Codes grid: 2 columns ═══ -->
  <!-- Row 1 -->

  <!-- Tile: GitHub (pinned) -->
  <rect x="20" y="158" width="168" height="130" rx="12" fill="#14181d" stroke="#7cc4ff" stroke-width="1.5"/>
