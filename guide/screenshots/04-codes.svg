  <text x="218" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8a94a3">Google</text>
  <text x="218" y="230" font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="24" letter-spacing="4" fill="#7cc4ff">719 405</text>
  <g transform="translate(334,218)">
