  <text x="218" y="322" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="13" fill="#e6e8eb">AWS</text>
  <text x="218" y="338" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8a94a3">Amazon</text>
  <text x="218" y="372" font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="24" letter-spacing="4" fill="#7cc4ff">256 109</text>
