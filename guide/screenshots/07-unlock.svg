<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 700" width="390" height="700">
  <rect width="390" height="700" fill="#0b0d10"/>

  <!-- Content box -->
  <rect x="20" y="120" width="350" height="340" rx="14" fill="#14181d" stroke="#262c34" stroke-width="1"/>

  <!-- Brand (centered) -->
  <text x="195" y="200" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="32" letter-spacing="4" fill="#7cc4ff">TIJORI</text>

  <!-- Folder chip centered -->
  <rect x="152" y="218" width="86" height="22" rx="5" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="195" y="233" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#8a94a3">my-vault</text>

  <!-- Password label + field -->
  <text x="40" y="276" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Master password</text>
  <rect x="40" y="284" width="310" height="44" rx="9" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="58" y="312" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#e6e8eb" letter-spacing="3">••••••••••••••</text>
  <text x="334" y="312" text-anchor="end" font-size="17" fill="#8a94a3">👁</text>

  <!-- Hint area (empty) -->
  <rect x="40" y="334" width="310" height="16" rx="3" fill="transparent"/>

  <!-- Action buttons -->
  <rect x="40" y="358" width="140" height="38" rx="8" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
  <text x="110" y="382" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a94a3">Different folder</text>
  <rect x="210" y="358" width="140" height="38" rx="8" fill="#7cc4ff"/>
  <text x="280" y="382" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="15" fill="#001122">Unlock</text>
</svg>
