      <text x="12" y="22" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="13" letter-spacing="1" fill="#7cc4ff">TIJORI</text>
      <rect x="68" y="12" width="50" height="14" rx="3" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="93" y="22" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="7" fill="#8a94a3">my-vault</text>
      <rect x="186" y="11" width="26" height="15" rx="4" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="199" y="22" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" fill="#e6e8eb">Lock</text>
      <!-- search bar -->
