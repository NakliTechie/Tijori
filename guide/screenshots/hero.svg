      <text x="22" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="9" fill="#e6e8eb">GitHub</text>
      <text x="96" y="104" text-anchor="end" font-size="9" fill="#ffc857">★</text>
      <text x="22" y="117" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="7" fill="#8a94a3">chirag@github.com</text>
      <text x="22" y="140" font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="15" letter-spacing="3" fill="#7cc4ff">482 031</text>
      <g transform="translate(86,134)">
        <circle cx="0" cy="0" r="10" fill="none" stroke="#262c34" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="10" fill="none" stroke="#7cc4ff" stroke-width="2.5" stroke-linecap="round"
          stroke-dasharray="62.8" stroke-dashoffset="20.7" transform="rotate(-90)"/>
      </g>
      <!-- Tile: Google -->
      <rect x="116" y="91" width="92" height="76" rx="8" fill="#14181d" stroke="#262c34" stroke-width="1"/>
      <text x="126" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="9" fill="#e6e8eb">Google</text>
      <text x="126" y="117" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="7" fill="#8a94a3">Google</text>
      <text x="126" y="140" font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="15" letter-spacing="3" fill="#7cc4ff">719 405</text>
      <g transform="translate(190,134)">
        <circle cx="0" cy="0" r="10" fill="none" stroke="#262c34" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="10" fill="none" stroke="#7cc4ff" stroke-width="2.5" stroke-linecap="round"
          stroke-dasharray="62.8" stroke-dashoffset="34.5" transform="rotate(-90)"/>
      </g>
      <!-- Tile: Dropbox (expiring) -->
      <rect x="12" y="174" width="92" height="82" rx="8" fill="#14181d" stroke="#262c34" stroke-width="1"/>
      <text x="22" y="189" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="9" fill="#e6e8eb">Dropbox</text>
      <text x="22" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="7" fill="#8a94a3">dropbox.com</text>
      <text x="22" y="222" font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="15" letter-spacing="3" fill="#ff6b6b">034 821</text>
      <g transform="translate(86,216)">
