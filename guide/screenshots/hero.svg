        <circle cx="0" cy="0" r="10" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round"
          stroke-dasharray="62.8" stroke-dashoffset="58.3" transform="rotate(-90)"/>
      </g>
      <text x="22" y="244" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="7" fill="#8a94a3">next: </text>
      <text x="44" y="244" font-family="ui-monospace,Menlo,monospace" font-size="8" font-weight="700" letter-spacing="1" fill="#ffc857">192 740</text>
