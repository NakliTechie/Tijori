      <text x="126" y="189" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="9" fill="#e6e8eb">AWS</text>
      <text x="126" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="7" fill="#8a94a3">Amazon</text>
      <text x="126" y="222" font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="15" letter-spacing="3" fill="#7cc4ff">256 109</text>
      <g transform="translate(190,216)">
        <circle cx="0" cy="0" r="10" fill="none" stroke="#262c34" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="10" fill="none" stroke="#7cc4ff" stroke-width="2.5" stroke-linecap="round"
