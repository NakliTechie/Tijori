<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" width="1080" height="600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7cc4ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0b0d10" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="phone1clip"><rect x="0" y="0" width="220" height="400" rx="28"/></clipPath>
    <clipPath id="phone2clip"><rect x="0" y="0" width="220" height="400" rx="28"/></clipPath>
    <clipPath id="phone3clip"><rect x="0" y="0" width="220" height="400" rx="28"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1080" height="600" fill="#080a0d"/>
  <rect width="1080" height="600" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="300" x2="1080" y2="300" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="600" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- ───── PHONE 1: Unlock ───── -->
  <g transform="translate(105,76)">
    <!-- Frame -->
    <rect width="220" height="400" rx="28" fill="#0b0d10" stroke="#2a3040" stroke-width="2.5"/>
    <!-- Dynamic island -->
    <rect x="74" y="8" width="72" height="14" rx="7" fill="#080a0d"/>
    <!-- Screen content clipped -->
    <g clip-path="url(#phone1clip)">
      <rect width="220" height="400" fill="#0b0d10"/>
      <!-- Content box -->
      <rect x="11" y="68" width="198" height="194" rx="10" fill="#14181d" stroke="#262c34" stroke-width="1"/>
      <!-- TIJORI -->
      <text x="110" y="114" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="22" letter-spacing="4" fill="#7cc4ff">TIJORI</text>
      <!-- folder chip -->
      <rect x="82" y="124" width="56" height="16" rx="4" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="110" y="135" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="8" fill="#8a94a3">my-vault</text>
      <!-- password label -->
      <text x="22" y="158" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#8a94a3">Master password</text>
      <rect x="22" y="164" width="176" height="28" rx="6" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="34" y="181" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#e6e8eb" letter-spacing="3">••••••••••••</text>
      <!-- buttons -->
      <rect x="22" y="202" width="80" height="24" rx="5" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="62" y="218" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#8a94a3">Different folder</text>
      <rect x="118" y="202" width="80" height="24" rx="5" fill="#7cc4ff"/>
      <text x="158" y="218" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="11" fill="#001122">Unlock</text>
      <!-- bottom text -->
      <text x="110" y="300" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#3a4050">No network requests after load.</text>
      <text x="110" y="314" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#3a4050">Vault lives in a folder you choose.</text>
    </g>
    <!-- Shine -->
    <rect width="220" height="400" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </g>

  <!-- ───── PHONE 2: Vault list (center, slightly taller) ───── -->
  <g transform="translate(430,56)">
