      <rect x="194" y="40" width="20" height="22" rx="5" fill="#7cc4ff"/>
      <text x="204" y="55" text-anchor="middle" font-weight="700" font-size="13" fill="#001122">＋</text>
      <!-- filter tabs -->
      <rect x="12" y="68" width="26" height="17" rx="4" fill="#7cc4ff"/>
      <text x="25" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" font-weight="600" fill="#001122">All</text>
      <rect x="42" y="68" width="36" height="17" rx="4" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="60" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" fill="#8a94a3">Logins</text>
      <rect x="82" y="68" width="32" height="17" rx="4" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="98" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" fill="#8a94a3">Cards</text>
      <rect x="118" y="68" width="30" height="17" rx="4" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="133" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" fill="#8a94a3">Notes</text>
      <rect x="152" y="68" width="32" height="17" rx="4" fill="#1b2026" stroke="#262c34" stroke-width="1"/>
      <text x="168" y="80" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" fill="#8a94a3">Codes</text>
      <!-- entries -->
      <rect x="12" y="92" width="196" height="40" rx="7" fill="#14181d" stroke="#262c34" stroke-width="1"/>
      <text x="26" y="107" font-size="14">🔑</text>
      <text x="46" y="107" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="11" fill="#e6e8eb">GitHub</text>
      <text x="46" y="121" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#8a94a3">chirag@github.com</text>
      <text x="198" y="114" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8a94a3">⎘</text>

      <rect x="12" y="137" width="196" height="40" rx="7" fill="#14181d" stroke="#262c34" stroke-width="1"/>
      <text x="26" y="152" font-size="14">💳</text>
      <text x="46" y="152" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="11" fill="#e6e8eb">Visa Signature</text>
      <text x="46" y="166" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#8a94a3">•••• 4823</text>
      <text x="198" y="159" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8a94a3">⎘</text>

      <rect x="12" y="182" width="196" height="40" rx="7" fill="#14181d" stroke="#262c34" stroke-width="1"/>
      <text x="26" y="197" font-size="14">📝</text>
      <text x="46" y="197" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="11" fill="#e6e8eb">SSH passphrase</text>
      <text x="46" y="211" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#8a94a3">Personal MacBook key</text>

      <rect x="12" y="227" width="196" height="40" rx="7" fill="#14181d" stroke="#262c34" stroke-width="1"/>
      <text x="26" y="242" font-size="14">🔐</text>
      <text x="46" y="242" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="11" fill="#e6e8eb">AWS</text>
      <text x="46" y="256" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#8a94a3">Amazon · root account</text>
      <text x="198" y="249" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8a94a3">⎘</text>
    </g>
    <rect width="220" height="440" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </g>

  <!-- ───── PHONE 3: Codes grid ───── -->
