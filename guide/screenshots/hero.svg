  <text x="540" y="532" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#5a6676">Logins · Cards · Notes · TOTP</text>
  <text x="865" y="510" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#5a6676">RFC 6238 · tap to copy · countdown rings</text>

  <!-- ───── Central brand text ───── -->
  <text x="540" y="554" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="13" letter-spacing="5" fill="#7cc4ff">TIJORI</text>
  <text x="540" y="572" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#3a4450">naklitechie.github.io/Tijori</text>
